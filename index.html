<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUTIERS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="top-header"><div class="logo">EUTIERS</div></div>
    <div class="nav-container" id="modesNav"></div>
    <div class="container">
        <div class="header-row">
            <h1 id="tier-header-title">ALL TIERS</h1>
            <input type="text" id="searchBar" placeholder="Search player...">
        </div>
        <table>
            <thead>
                <tr><th style="width: 50px;">#</th><th>PLAYER</th><th style="width: 100px;">REGION</th><th style="width: 150px;">TIERS</th></tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <script src="script.js"></script>

    <!-- ADMIN & PROFILE MODALS (Те же, что были раньше) -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-card">
            <div class="modal-section-title">ADMIN LOGIN</div>
            <input type="text" id="adminUser" placeholder="User">
            <input type="password" id="adminPass" placeholder="Pass">
            <button class="admin-btn" onclick="tryLogin()">Login</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel" style="display: none;">
        <h3>Control Panel</h3>
        <input type="text" id="nickname" placeholder="Nick">
        <select id="region-select">
            <option value="EU">EU</option><option value="NA">NA</option><option value="AS">AS</option><option value="AU">AU</option><option value="OC">OC</option>
        </select>
        <select id="mode-select"></select>
        <select id="tier-select">
            <option value="HT1">HT1</option><option value="LT1">LT1</option><option value="HT2">HT2</option><option value="LT2">LT2</option><option value="HT3">HT3</option><option value="LT3">LT3</option><option value="HT4">HT4</option><option value="LT4">LT4</option><option value="HT5">HT5</option><option value="LT5">LT5</option><option value="NONE">NONE</option>
        </select>
        <button class="admin-btn" onclick="savePlayer(event)">Save</button>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModalDirect()">✕</button>
            <div id="skin_container"></div>
            <div class="modal-nick" id="modalNick">Player</div>
            <div style="text-align:center"><span class="modal-role" id="modalRole">Rookie</span></div>
            <div class="modal-box">
                <span class="modal-rank-num" id="modalRank">1.</span>
                <div id="modalPoints">0 pts</div>
            </div>
            <div class="modal-tiers-grid" id="modalTiersGrid"></div>
        </div>
    </div>
</body>
</html>
