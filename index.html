<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUTIERS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <div class="top-header"><div class="logo">EUTIERS</div></div>
    <div class="nav-container" id="modesNav"></div>

    <div class="container">
        <div class="header-row">
            <h1 id="tier-header-title">ALL TIERS</h1>
            <input type="text" id="searchBar" placeholder="Search player...">
        </div>
        <table>
            <thead>
                <tr><th style="width: 50px;">#</th><th>PLAYER</th><th style="width: 100px;">REGION</th><th style="width: 150px;">TIERS</th></tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <!-- ТВОЙ СКРИПТ (В САМОМ КОНЦЕ) -->
    <script src="script.js"></script>

    <!-- АДМИНКА И МОДАЛКИ (БЕЗ ИЗМЕНЕНИЙ) -->
    <div class="modal-overlay" id="loginModal" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div class="modal-section-title" style="text-align: center;">ADMIN LOGIN</div>
            <div class="form-group"><label>User:</label><input type="text" id="adminUser"></div>
            <div class="form-group"><label>Pass:</label><input type="password" id="adminPass"></div>
            <button class="admin-btn" onclick="tryLogin()">Login</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel" style="display: none;">
        <h3>Control Panel</h3>
        <div class="form-group"><label>Nick:</label><input type="text" id="nickname"></div>
        <div class="form-group"><label>Region:</label>
            <select id="region-select">
                <option value="EU">EU</option><option value="NA">NA</option>
                <option value="AS">AS</option><option value="AU">AU</option><option value="OC">OC</option>
            </select>
        </div>
        <div class="form-group"><label>Mode:</label><select id="mode-select"></select></div>
        <div class="form-group"><label>Tier:</label>
            <select id="tier-select">
                <option value="HT1">HT1</option><option value="LT1">LT1</option>
                <option value="HT2">HT2</option><option value="LT2">LT2</option>
                <option value="HT3">HT3</option><option value="LT3">LT3</option>
                <option value="HT4">HT4</option><option value="LT4">LT4</option>
                <option value="HT5">HT5</option><option value="LT5">LT5</option>
                <option value="NONE">NONE</option>
            </select>
        </div>
        <button class="admin-btn" onclick="savePlayer(event)">Save / Update</button>
        <button class="admin-btn delete-btn" onclick="deletePlayerFromAdmin()">Delete Player</button>
    </div>

    <div class="modal-overlay" id="profileModal" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div class="avatar-container"><div id="skin_container"></div></div>
            <div class="modal-nick" id="modalNick">Player</div>
            <div class="role-wrapper"><div class="modal-role" id="modalRole">Rookie</div></div>
            <div class="modal-region" id="modalRegion">EU</div>
            <div class="modal-section-title">POSITION</div>
            <div class="modal-box">
                <span class="modal-rank-num" id="modalRank">1.</span>
                <div class="modal-box-right"><span class="modal-rank-title">🏆 OVERALL</span><span class="modal-points" id="modalPoints">(0 points)</span></div>
            </div>
            <div class="modal-section-title">TIERS</div>
            <div class="modal-tiers-grid" id="modalTiersGrid"></div>
        </div>
    </div>
</body>
</html>
