<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCTIERS</title>
    <!-- Запрещаем поисковикам индексировать сайт -->
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- НАВИГАЦИЯ (РЕЖИМЫ) -->
    <div class="nav-container" id="modesNav">
        <!-- Сюда JS вставит кнопки режимов -->
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="container">
        <div class="header-row">
            <h1 id="tier-header-title">ALL TIERS</h1>
            <input type="text" id="searchBar" placeholder="Поиск игрока...">
        </div>

        <!-- ТАБЛИЦА ЛИДЕРОВ -->
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">#</th>
                    <th>ИГРОК</th>
                    <th style="width: 100px;">РЕГИОН</th>
                    <th style="width: 150px;">TIERS</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <!-- Сюда JS вставит строки игроков -->
            </tbody>
        </table>
    </div>

    <!-- АДМИН-ПАНЕЛЬ (Открывается на клавишу ` или Ё) -->
    <div class="admin-panel" id="adminPanel" style="display: none;">
        <h3>Панель управления</h3>
        <div class="form-group">
            <label>Ник в Minecraft:</label>
            <input type="text" id="nickname" placeholder="Player nick">
        </div>
        <div class="form-group">
            <label>Регион:</label>
            <select id="region-select">
                <option value="EU">EU</option>
                <option value="NA">NA</option>
                <option value="AS">AS</option>
            </select>
        </div>
        <div class="form-group">
            <label>Режим:</label>
            <select id="mode-select">
                <!-- Сюда JS вставит режимы -->
            </select>
        </div>
        <div class="form-group">
            <label>Тир:</label>
            <select id="tier-select">
                <option value="HT1">HT1</option>
                <option value="LT1">LT1</option>
                <option value="HT2">HT2</option>
                <option value="LT2">LT2</option>
                <option value="HT3">HT3</option>
                <option value="LT3">LT3</option>
                <option value="HT4">HT4</option>
                <option value="LT4">LT4</option>
                <option value="HT5">HT5</option>
                <option value="LT5">LT5</option>
                <option value="NONE">NONE</option>
            </select>
        </div>
        <!-- ИСПРАВЛЕНО: Добавлен event для правильной работы JS -->
        <button class="admin-btn" onclick="savePlayer(event)">Сохранить / Обновить</button>
        <button class="admin-btn delete-btn" onclick="deletePlayerFromAdmin()">Удалить игрока</button>
    </div>

    <!-- PROFILE MODAL (МОДАЛЬНОЕ ОКНО ПРОФИЛЯ) -->
    <div class="modal-overlay" id="profileModal" onclick="closeModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModalDirect()">✕</button>
            
            <div class="avatar-container">
                <!-- ИСПРАВЛЕНО: Маленькая круглая аватарка (лицо) -->
                <img id="modalAvatar" class="modal-avatar" src="" alt="Avatar">
                
                <!-- ИСПРАВЛЕНО: Большой скин в полный рост -->
                <img id="modalImg" class="modal-skin" src="" alt="Skin">
            </div>

            <div class="modal-nick" id="modalNick">PlayerName</div>
            <div class="modal-role" id="modalRole">◆ Rookie</div>
            <div class="modal-region" id="modalRegion">Europe</div>

            <!-- СТАТУС АККАУНТА -->
            <div id="modalAccountType" style="font-size: 12px; color: #fff; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; background: #30363d;">✔ Статус скрыт</div>

            <div class="modal-section-title">ПОЗИЦИЯ В ТОПЕ</div>
            <div class="modal-box">
                <span class="modal-rank-num" id="modalRank">1.</span>
                <span class="modal-rank-title">🏆 OVERALL</span>
                <div style="font-size: 14px; color: var(--text-gray); font-weight: 700; margin-top: 5px;" id="modalPoints">0 points</div>
            </div>

            <div class="modal-section-title">TIERS</div>
            <div class="modal-tiers-container" id="modalTiersGrid"></div>
        </div>
    </div>

    <!-- Подключаем файл со скриптами -->
    <script src="script.js"></script>
</body>
</html>
